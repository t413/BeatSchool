<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RhythmClass Coordinator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: monospace;
      background: #0e0e0e;
      color: #e0e0e0;
      padding: 1.5rem;
      min-height: 100vh;
    }

    h1 { font-size: 1.1rem; color: #7eb8f7; margin-bottom: 0.25rem; }
    .subtitle { font-size: 0.75rem; color: #555; margin-bottom: 1.5rem; }

    /* Status bar */
    #status-bar {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
      font-size: 0.8rem;
      color: #888;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #444;
      flex-shrink: 0;
    }
    .dot.connected { background: #4caf50; }
    .dot.error     { background: #f44; }

    /* Controls */
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    button {
      font-family: monospace;
      font-size: 0.8rem;
      padding: 0.4rem 0.9rem;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #ccc;
      cursor: pointer;
      border-radius: 3px;
      transition: background 0.1s, color 0.1s;
    }
    button:hover  { background: #2a2a2a; color: #fff; }
    button:active { background: #333; }

    .node-id-input {
      font-family: monospace;
      font-size: 0.8rem;
      padding: 0.4rem 0.6rem;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #ccc;
      border-radius: 3px;
      width: 80px;
    }

    /* State dump */
    #state-pre {
      white-space: pre;
      background: #111;
      border: 1px solid #222;
      border-radius: 4px;
      padding: 1rem;
      font-size: 0.78rem;
      line-height: 1.5;
      overflow-x: auto;
      max-height: 70vh;
      overflow-y: auto;
      color: #c8e6c9;
    }

    .section-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #555;
      margin-bottom: 0.4rem;
    }
  </style>
</head>
<body>
  <h1>RhythmClass Coordinator</h1>
  <p class="subtitle">MVP — raw state view</p>

  <div id="status-bar">
    <div class="dot" id="sse-dot"></div>
    <span id="sse-label">SSE: connecting…</span>
    &nbsp;|&nbsp;
    <span id="update-counter">0 updates</span>
  </div>

  <div class="controls">
    <input  class="node-id-input" id="node-id-input" value="0xFF" title="Node ID (hex or dec, 0xFF = broadcast)">
    <button onclick="sendPing()">Ping broadcast</button>
    <button onclick="sendVersion()">Req Vers</button>
    <button onclick="sendZero()">Zero all</button>
    <button onclick="sendMode('0x00')">Mode: IMU</button>
    <button onclick="sendMode('0x01')">Mode: Solid white</button>
    <button onclick="sendMode('0x02')">Mode: Flash</button>
    <button onclick="sendMode('0x03')">Mode: Chase</button>
    <button onclick="sendMode('0xFF')">Mode: Off</button>
    <button onclick="fetchSnapshot()">Refresh snapshot</button>
  </div>

  <div class="section-label">Node state</div>
  <pre id="state-pre">(waiting for data…)</pre>

  <script src="app.js"></script>
</body>
</html>
