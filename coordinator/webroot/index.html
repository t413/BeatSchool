<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Show Control</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100%; width: 100%; }
    body {
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: #070c14;
      color: #d8e4f2;
    }
    button, select {
      font: inherit;
      color: inherit;
      background: none;
      border: none;
    }
    button { cursor: pointer; }
    .page-shell {
      display: grid;
      grid-template-rows: minmax(0, 1fr) minmax(0, 300px);
      gap: 8px;
      min-height: 100vh;
      height: 100vh;
      padding: 10px;
    }
    .node-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      grid-template-rows: repeat(2, minmax(0, 1fr));
      gap: 6px;
      min-height: 0;
    }
    .node-card {
      background: #08101a;
      border: 1px solid #132032;
      display: flex;
      min-height: 0;
      height: 100%;
      overflow: hidden;
      position: relative;
    }
    .node-card.offline { opacity: 0.35; }
    .node-card canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
    .score-overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(125, 244, 255, 0.9);
      color: #000;
      padding: 12px 18px;
      border-radius: 4px;
      font-weight: bold;
      font-size: 13px;
      white-space: pre-line;
      text-align: center;
      line-height: 1.3;
      pointer-events: none;
      opacity: 1;
      transition: opacity 1s ease-out;
      z-index: 10;
      box-shadow: 0 0 20px rgba(125, 244, 255, 0.5);
      animation: scorePopIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes scorePopIn {
      0% { transform: translate(-50%, -50%) scale(0.3); opacity: 0; }
      100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    }
    .score-display {
      position: absolute;
      top: 4px;
      left: 4px;
      right: 4px;
      background: rgba(8, 12, 20, 0.85);
      border: 1px solid #203146;
      border-radius: 3px;
      padding: 4px 6px;
      display: none;
      z-index: 5;
    }
    .score-display .rank {
      font-size: 13px;
      font-weight: bold;
      color: #7df4ff;
      margin-bottom: 2px;
    }
    .score-display .dominant {
      font-size: 11px;
      color: #8291ae;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .media-stage {
      display: grid;
      grid-template-columns: 14rem minmax(0, 1fr);
      gap: 8px;
      min-height: 0;
      align-items: stretch;
    }
    .media-panel {
      display: grid;
      gap: 6px;
      padding: 8px;
      background: #08101a;
      border: 1px solid #132032;
    }
    .track-title {
      font-size: 1rem;
      line-height: 1.2;
      color: #eef4ff;
    }
    .track-meta {
      font-size: 0.82rem;
      color: #8291ae;
    }
    .control-button {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #203146;
      background: #08121d;
      color: #d9e4f2;
      text-align: left;
    }
    .control-button.secondary {
      border-color: #161f2d;
    }
    select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #203146;
      background: #071018;
      color: #d9e4f2;
      appearance: none;
    }
    .sse-status {
      display: flex;
      gap: 8px;
      color: #7f8fa8;
      font-size: 0.78rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .status-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #4f637d;
    }
    .status-dot.connected { background: #6ef49e; }
    .status-dot.error { background: #ff9898; }
    .wave-panel {
      background: #061018;
      border: 1px solid #132032;
      display: flex;
      min-height: 0;
    }
    #waveform-canvas {
      width: 100%;
      height: 100%;
      min-height: 0;
      display: block;
      background: #061018;
    }
    @media (max-width: 900px) {
      .media-stage { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <div id="node-grid" class="node-grid"></div>

    <section class="media-stage">
      <aside class="media-panel">
        <div class="track-title" id="track-title">No track selected</div>
        <div class="track-meta" id="track-meta">paused · 00:00 / 00:00</div>
        <button id="play-btn" class="control-button" onclick="togglePlay()">Play</button>
        <button id="reset-btn" class="control-button secondary" onclick="resetTrack()" disabled>Score & Reset</button>
        <button id="zero-btn" class="control-button secondary" onclick="sendZero()">Zero</button>
        <button id="ping-btn" class="control-button secondary" onclick="sendPing()">Ping</button>
        <select id="track-select" onchange="selectTrack(this.value)">
          <option value="">Loading tracks…</option>
        </select>
        <div class="sse-status">
          <span class="status-dot" id="sse-dot"></span>
          <span id="sse-label">connecting…</span>
        </div>
      </aside>

      <div class="wave-panel">
        <canvas id="waveform-canvas" aria-label="Track waveform"></canvas>
      </div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
