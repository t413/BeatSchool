name: Python Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Cache venv
      uses: actions/cache@v4
      with:
        path: venv
        key: ${{ runner.os }}-venv-${{ hashFiles('coordinator/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-venv-

    - name: Set up venv
      run: python -m venv venv

    - name: Install dependencies
      run: |
        source venv/bin/activate
        python -m pip install -U -r coordinator/requirements.txt pip pytest

    - name: Run tests
      working-directory: coordinator
      run: |
        source ../venv/bin/activate
        pytest -v --junitxml=test-results.xml

    - name: Upload test results
      uses: actions/upload-artifact@v4
      with:
        name: pytest-results
        path: coordinator/test-results.xml
