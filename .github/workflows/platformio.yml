name: PlatformIO CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install PlatformIO
      run: |
        python -m pip install --upgrade pip
        pip install platformio

    - name: Install PlatformIO dependencies
      run: |
        pio pkg install --no-save -g --platform espressif8266

    - name: Cache PlatformIO
      uses: actions/cache@v4
      with:
        path: ~/.piocache
        key: ${{ runner.os }}-piocache-${{ hashFiles('**/platformio.ini') }}
        restore-keys: |
          ${{ runner.os }}-piocache-

    - name: Build firmware
      working-directory: tt-firmware
      run: |
        export PLATFORMIO_BUILD_CACHE_DIR=~/.piocache
        mkdir -p ~/.piocache
        pio run

    - name: Run unit tests
      working-directory: tt-firmware
      run: |
        pio test -e test_native -vv

    - name: Upload firmware artifacts
      uses: actions/upload-artifact@v4
      with:
        name: firmware-binaries
        path: tt-firmware/firmware_*.bin
